<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slate-Weather | Pro Console</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="dynamic-backdrop"></div>
    <div class="main-console">
        <header class="search-header">
            <input type="text" id="city-input" placeholder="Search City (e.g. Norman, OK)...">
            <button id="search-btn">LOCATE</button>
            <div id="location-display">--</div>
        </header>

        <nav class="smart-bar">
            <button class="tab-btn active" data-tab="dash">DASHBOARD</button>
            <button class="tab-btn" data-tab="extended">EXTENDED</button>
            <button class="tab-btn" data-tab="nws">NWS AFD</button>
            <button class="tab-btn" data-tab="radar">RADAR</button>
            <button class="tab-btn" data-tab="spc">SPC OUTLOOK</button>
            <button class="tab-btn" data-tab="severe">SEVERE FEED</button>
            <button class="tab-btn" data-tab="settings">SETTINGS</button>
        </nav>

        <main class="content-area">
            <section id="dash" class="tab-pane active">
                <div class="current-hero">
                    <div id="main-icon"></div>
                    <h1 id="main-temp">--°</h1>
                    <p id="main-desc">--</p>
                </div>
                <div class="stats-grid" id="current-stats"></div>
            </section>

            <section id="extended" class="tab-pane">
                <div class="forecast-list" id="extended-forecast"></div>
            </section>

            <section id="nws" class="tab-pane">
                <div class="text-product" id="afd-content">Loading NWS Discussion...</div>
            </section>

            <section id="radar" class="tab-pane">
                <div id="radar-container"></div>
            </section>

            <section id="spc" class="tab-pane">
                <div class="text-product" id="spc-content">Fetching SPC Outlooks...</div>
            </section>

            <section id="severe" class="tab-pane">
                <div id="severe-feed">Scanning for active hazards...</div>
            </section>

            <section id="settings" class="tab-pane">
                <div class="settings-card">
                    <h3>System Configuration</h3>
                    <p>API Key: <span class="key-mask">52079...952</span></p>
                    <p>Providers: OpenWeather, OpenMeteo, NWS, SPC, Rainviewer</p>
                </div>
            </section>
        </main>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
