<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLATEWEATHER PRO | TACTICAL OS V4.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="obsidian-core">

    <audio id="snd-click" src="https://www.soundjay.com/buttons/sounds/button-28.mp3"></audio>

    <div id="system-lock">
        <div class="lock-panel">
            <h1 class="tactical-title">SLATEWEATHER <span>PRO</span></h1>
            <div class="status-box">SYSTEM STATUS: <span id="sys-status">LOCKED</span></div>
            <div class="input-group">
                <input type="text" id="loc-input" placeholder="ENTER ZIP OR CITY (e.g. 60201)" autocomplete="off">
                <button onclick="bootSystem()">INITIALIZE</button>
            </div>
            <p id="feedback-msg">AWAITING COORDINATES...</p>
        </div>
    </div>

    <div id="app-shell" style="display: none;">
        <header class="main-header">
            <div class="brand">SLATEWEATHER // PRO</div>
            <div id="meta-data" class="meta-data">LOCKED // --</div>
        </header>

        <nav class="side-nav">
            <button class="nav-btn active" onclick="switchTab(event, 'spc-tab')">SPC OUTLOOKS</button>
            <button class="nav-btn" onclick="switchTab(event, 'radar-tab')">HI-RES RADAR</button>
            <button class="nav-btn" onclick="switchTab(event, 'model-tab')">8-MODEL ARRAY</button>
            <button class="nav-btn" onclick="switchTab(event, 'status-tab')">SYSTEM STATUS</button>
        </nav>

        <main class="content-area">
            <section id="spc-tab" class="tab-pane active">
                <div class="spc-gallery" id="spc-view"></div>
            </section>

            <section id="radar-tab" class="tab-pane">
                <div class="radar-container">
                    <iframe id="radar-map" frameborder="0"></iframe>
                </div>
            </section>

            <section id="model-tab" class="tab-pane">
                <div class="model-grid" id="model-output">
                    </div>
            </section>

            <section id="status-tab" class="tab-pane">
                <div class="status-console">
                    <div class="log-line">> CORE: SLATE_KERNAL_V2.5</div>
                    <div class="log-line">> NETWORK: CONNECTED</div>
                    <div id="status-log"></div>
                </div>
            </section>
        </main>
    </div>

    <div id="spc-modal" class="modal">
        <div class="modal-content obsidian-panel">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="modal-header">
                <h2 id="modal-title" class="tactical-title">DAY X // DETAILED RISK</h2>
            </div>
            <div id="modal-body" class="modal-body">
                </div>
        </div>
    </div>

    <div class="noise-overlay"></div>
    <script src="script.js"></script>
</body>
</html>
