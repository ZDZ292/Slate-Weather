<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SlateWeather PRO</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- AMBIENT LIQUID BACKGROUND -->
    <div class="liquid-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- LOCK SCREEN -->
    <div id="lock-screen" class="overlay">
        <div class="frosted-glass lock-panel">
            <h1 class="orbitron title">SLATE<span class="neon">WEATHER</span></h1>
            <div id="pin-display" class="pin-dots">....</div>
            <div id="keypad" class="keypad-grid"></div>
        </div>
    </div>

    <!-- MAIN INTERFACE -->
    <div id="app" class="hidden">
        <header class="frosted-glass top-nav">
            <div class="logo orbitron">SLATE<span class="neon">WEATHER</span></div>
            <div class="search-wrap">
                <input type="text" id="city-search" class="frosted-input" placeholder="SEARCH CITY...">
            </div>
            <nav class="nav-links">
                <button class="nav-btn active">CURRENT</button>
                <button class="nav-btn">SPC</button>
                <button class="nav-btn">MESO</button>
                <button class="nav-btn">14-DAY</button>
            </nav>
        </header>

        <main class="main-layout">
            <section class="frosted-glass hero-widget">
                <div class="hero-data">
                    <h2 class="orbitron neon">CHICAGO, IL</h2>
                    <p class="status-text">SYSTEM ACTIVE</p>
                    <h1 class="giant-temp">--°</h1>
                </div>
            </section>

            <section class="metrics-grid">
                <div class="frosted-glass metric-card">
                    <span class="label">PRECIP</span>
                    <span class="value" id="val-prec">0.00"</span>
                </div>
                <div class="frosted-glass metric-card">
                    <span class="label">WIND</span>
                    <span class="value" id="val-wind">-- MPH</span>
                </div>
                <div class="frosted-glass metric-card">
                    <span class="label">HUMIDITY</span>
                    <span class="value" id="val-hum">--%</span>
                </div>
            </section>
        </main>
    </div>

    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
</body>
</html>
