<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlateWeather PRO</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@200;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-theme">

    <div id="lock-screen" class="active">
        <div class="lock-status"><i class="fa-solid fa-lock"></i> PRIVATE WEATHER</div>
        <div class="clock-wrap">
            <h1 id="live-clock" class="serif-display">00:00:00</h1>
            <p id="live-date" class="date-sub">Loading Date...</p>
        </div>

        <div class="pin-interface">
            <div class="pin-dots" id="pin-dots">
                <span></span><span></span><span></span><span></span><span></span><span></span>
            </div>
            <div class="numpad">
                <button onclick="addPin('1')">1</button><button onclick="addPin('2')">2</button><button onclick="addPin('3')">3</button>
                <button onclick="addPin('4')">4</button><button onclick="addPin('5')">5</button><button onclick="addPin('6')">6</button>
                <button onclick="addPin('7')">7</button><button onclick="addPin('8')">8</button><button onclick="addPin('9')">9</button>
                <button class="small-text" onclick="submitPin()">ENTER</button><button onclick="addPin('0')">0</button>
                <button onclick="clearPin()"><i class="fa-solid fa-backspace"></i></button>
            </div>
            <p class="pin-hint">DEFAULT PASSCODE: 123456 • CHANGE IN SETTINGS</p>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <div class="sidebar">
            <div class="brand-v">SLATE<span>WEATHER</span></div>
            <nav>
                <button onclick="showPanel('main')"><i class="fa-solid fa-house"></i></button>
                <button onclick="showPanel('spc')"><i class="fa-solid fa-bolt"></i></button>
                <button onclick="showPanel('nws')"><i class="fa-solid fa-satellite"></i></button>
                <button onclick="location.reload()"><i class="fa-solid fa-power-off"></i></button>
            </nav>
        </div>

        <main class="content">
            <section id="main-panel" class="panel">
                <div class="weather-story-container">
                    <img id="nws-story" src="" alt="NWS Weather Story">
                </div>
                <div class="grid-layout">
                    <div class="card current-box">
                        <h2 id="loc-name">Evanston, IL</h2>
                        <div class="big-temp"><span id="main-temp">--</span>°</div>
                        <p id="main-desc">Fetching conditions...</p>
                    </div>
                    <div id="daily-forecast" class="card"></div>
                </div>
            </section>

            <section id="spc-panel" class="panel hidden">
                <h2>SPC CONVECTIVE OUTLOOKS</h2>
                <div class="spc-grid">
                    <div class="spc-card"><h4>DAY 1</h4><img id="spc-d1" src="https://www.spc.noaa.gov/products/outlook/day1otlk_2000.gif"></div>
                    <div class="spc-card"><h4>DAY 2</h4><img id="spc-d2" src="https://www.spc.noaa.gov/products/outlook/day2otlk_2000.gif"></div>
                    <div class="spc-card"><h4>DAY 3</h4><img id="spc-d3" src="https://www.spc.noaa.gov/products/outlook/day3otlk_2000.gif"></div>
                    <div class="spc-card"><h4>DAY 4-8</h4><img id="spc-d48" src="https://www.spc.noaa.gov/products/exper/day4-8/day48prob.gif"></div>
                </div>
            </section>

            <section id="nws-panel" class="panel hidden">
                <div class="nws-tabs">
                    <button onclick="fetchNWS('discussion')">Discussion</button>
                    <button onclick="fetchNWS('hwo')">HWO</button>
                </div>
                <div id="nws-text-output" class="nws-terminal">Select a product to view technical data.</div>
            </section>
        </main>
    </div>

    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
    <script src="nws.js"></script>
    <script src="spc.js"></script>
</body>
</html>
