<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlateWeather PRO | Tactical Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="top-bar">
        <span class="logo">SLATEWEATHER <strong>PRO</strong></span>
        <div class="status-indicator"><span class="dot"></span> LIVE DATA</div>
    </div>

    <nav class="tab-nav">
        <button class="tab-link active" onclick="openTab(event, 'spc')">SPC OUTLOOK</button>
        <button class="tab-link" onclick="openTab(event, 'radar')">HIGH RES RADAR</button>
        <button class="tab-link" onclick="openTab(event, 'models')">8-MODEL DATA</button>
    </nav>

    <section id="spc" class="tab-content" style="display: block;">
        <div class="frame-container">
            <h3>CONVECTIVE OUTLOOK (DAY 1)</h3>
            <img src="https://www.spc.noaa.gov/products/outlook/day1otlk_sm.gif" class="spc-map">
            <img src="https://www.spc.noaa.gov/products/outlook/day1probotlk_1300_torn_sm.gif" class="spc-map">
        </div>
    </section>

    <section id="radar" class="tab-content">
        <div class="radar-wrapper">
            <iframe src="https://www.rainviewer.com/map.html?loc=42.0411,-87.6901,6&base=1&layer=1&color=3" width="100%" height="100%" frameborder="0"></iframe>
        </div>
    </section>

    <section id="models" class="tab-content">
        <div class="model-grid">
            <div class="current-obs">
                <h2 id="city-name">EVANSTON, IL</h2>
                <div class="temp-big" id="main-temp">--°</div>
                <p id="condition-text">FETCHING DATA...</p>
            </div>
            <div class="data-log">
                <h3>MULTI-MODEL ANALYSIS (TEMP °C)</h3>
                <div id="model-list" class="terminal-text">Initializing 8-model fetch...</div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
