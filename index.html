<main id="dashboard" class="hidden">
    <div class="container">
        <!-- Top Bar -->
        <header class="header">
            <span class="logo">PRIVATE WEATHER</span>
            <h1 class="location-title">Chicago O'Hare <small>US</small></h1>
        </header>

        <div class="main-grid">
            <!-- Current Conditions Card -->
            <section class="card current-card">
                <p>NOW • ROSEMONT, US</p>
                <div class="temp-row">
                    <span class="big-temp" id="main-temp">50°</span>
                    <span class="temp-unit">°F</span>
                </div>
                <div class="stats-row">
                    <div><i class="fa-solid fa-wind"></i> 8 mph</div>
                    <div><i class="fa-solid fa-droplet"></i> 46%</div>
                </div>
            </section>

            <!-- 7-Day Forecast Card -->
            <section class="card forecast-card">
                <h3>7-DAY FORECAST</h3>
                <div id="daily-list">
                    <!-- Forecast rows go here -->
                </div>
            </section>
        </div>

        <!-- Next Hours (The 8 entries you wanted) -->
        <section class="card">
            <h3>NEXT HOURS</h3>
            <div class="hourly-scroll" id="hourly-list">
                <!-- 8 entries generated by JS -->
            </div>
        </section>

        <!-- Bottom Grid (UV, Sun Arc, etc.) -->
        <div class="bottom-grid">
            <div class="card mini"><h4>SUN ARC</h4></div>
            <div class="card mini"><h4>UV INDEX</h4></div>
            <div class="card mini"><h4>AIR QUALITY</h4></div>
        </div>
    </div>
</main>
