<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SLATE WEATHER</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="lock-screen" class="active">
        <div class="scanline"></div>
        <div class="lock-content">
            <h2 class="orbitron">SLATE SYSTEM</h2>
            <div id="pin-view">••••</div>
            <div class="numpad" id="numpad"></div>
        </div>
    </div>

    <div id="app" class="hidden">
        <header>
            <div class="slate-logo orbitron">
                <div class="sun-merge"></div> SLATE <span class="green">WEATHER</span>
            </div>
            <nav>
                <button onclick="switchTab('current')" class="t-btn active">CURRENT</button>
                <button onclick="switchTab('spc')" class="t-btn">SPC OUTLOOK</button>
                <button onclick="switchTab('mcd')" class="t-btn">MESOSCALE</button>
                <button onclick="switchTab('14day')" class="t-btn">14-DAY</button>
                <button onclick="switchTab('72hr')" class="t-btn">72-HR</button>
            </nav>
        </header>

        <main>
            <section id="current" class="tab active">
                <div class="live-hero">
                    <div id="big-icon"></div>
                    <h1 id="main-temp">--°</h1>
                    <div class="precip-stats">
                        SNOW: <span id="snow-val">0.0"</span> RAIN: <span id="rain-val">0.0"</span>
                    </div>
                </div>
                <div class="alert-box">
                    <h3 class="orbitron">LIVE ALERTS</h3>
                    <div id="alert-feed">SCANNING FOR THREATS...</div>
                </div>
            </section>

            <section id="spc" class="tab">
                <div class="spc-container" id="spc-list"></div>
            </section>

            <section id="mcd" class="tab">
                <div class="terminal" id="mcd-content">INITIALIZING CONNECTION TO NWS...</div>
            </section>

            <section id="14day" class="tab"><div class="grid" id="long-range"></div></section>
            <section id="72hr" class="tab"><div class="grid" id="hourly-72"></div></section>
        </main>
    </div>

    <script src="config.js"></script>
    <script src="icons.js"></script>
    <script src="auth.js"></script>
    <script src="spc.js"></script>
    <script src="nws.js"></script>
    <script src="app.js"></script>
</body>
</html>
