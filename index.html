<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SlateWeather | Chicago</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="lock-screen" class="active">
        <div class="glass-orb"></div>
        <div class="lock-panel">
            <h1 class="orbitron">SLATE<span class="green">WEATHER</span></h1>
            <div id="pin-display"></div>
            <div class="glass-keypad" id="keypad"></div>
        </div>
    </div>

    <div id="main-ui" class="hidden">
        <header class="glass-header">
            <div class="brand">
                <div class="sun-logo"></div>
                <span class="orbitron">SLATE<span class="green">WEATHER</span></span>
            </div>
            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="city-search" placeholder="Search City (e.g. Chicago)...">
            </div>
            <nav class="glass-tabs">
                <button onclick="tab('curr')" class="tab-btn active">CURRENT</button>
                <button onclick="tab('spc')" class="tab-btn">SPC</button>
                <button onclick="tab('mcd')" class="tab-btn">MESO</button>
                <button onclick="tab('14d')" class="tab-btn">14-DAY</button>
                <button onclick="tab('72h')" class="tab-btn">72-HR</button>
            </nav>
        </header>

        <main class="liquid-viewport">
            <!-- Current Section -->
            <section id="view-curr" class="glass-view active">
                <div class="hero-layout">
                    <div class="main-stats">
                        <div id="hero-icon"></div>
                        <h1 id="hero-temp">--°</h1>
                        <p id="hero-desc">INITIALIZING...</p>
                    </div>
                    <div class="side-metrics">
                        <div class="metric-glass"><span>PRECIP</span><b id="m-precip">0.0"</b></div>
                        <div class="metric-glass"><span>WIND</span><b id="m-wind">-- mph</b></div>
                        <div class="metric-glass"><span>HUMIDITY</span><b id="m-hum">--%</b></div>
                    </div>
                </div>
                <div class="alert-glass-row">
                    <h3><i class="fa-solid fa-triangle-exclamation"></i> LIVE ALERTS</h3>
                    <div id="alert-stream">No active threats detected for Chicago.</div>
                </div>
            </section>

            <!-- SPC Section -->
            <section id="view-spc" class="glass-view">
                <div class="spc-grid" id="spc-display"></div>
            </section>

            <!-- Mesoscale Section -->
            <section id="view-mcd" class="glass-view">
                <div class="terminal-glass" id="mcd-log">Connecting to NWS Mesoscale Feed...</div>
            </section>

            <!-- Forecast Sections -->
            <section id="view-14d" class="glass-view"><div class="flex-grid" id="list-14d"></div></section>
            <section id="view-72h" class="glass-view"><div class="flex-grid" id="list-72h"></div></section>
        </main>
    </div>

    <script src="config.js"></script>
    <script src="icons.js"></script>
    <script src="auth.js"></script>
    <script src="spc.js"></script>
    <script src="nws.js"></script>
    <script src="app.js"></script>
</body>
</html>
